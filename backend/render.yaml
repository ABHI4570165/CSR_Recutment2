services:
  - type: web
    name: mha-quiz-api
    env: node
    region: singapore   # closest to India
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false      # set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: REDIS_URL
        sync: false      # optional
      - key: FRONTEND_URL
        sync: false      # your Hostinger URL
